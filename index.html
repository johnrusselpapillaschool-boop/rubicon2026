<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUBICON 2026 | PRO TIMER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .timer-font { font-family: 'JetBrains Mono', monospace; }
        .ready { color: #4ade80 !important; text-shadow: 0 0 20px rgba(74, 222, 128, 0.5); }
        .running { color: #f8fafc; }
        .holding { color: #fbbf24; }
        .scramble { font-family: 'JetBrains Mono', monospace; letter-spacing: 2px; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div class="h-24 flex flex-col items-center justify-center border-b border-white/5 bg-black/40 backdrop-blur-md">
        <div id="scramble" class="scramble text-xl md:text-2xl font-medium text-blue-400 text-center px-4">Loading Scramble...</div>
    </div>

    <div class="flex-1 flex overflow-hidden">
        <div class="w-64 border-r border-white/5 bg-black/20 p-6 hidden md:block">
            <h2 class="text-xs font-black uppercase tracking-widest text-gray-500 mb-6">Session Stats</h2>
            <div class="space-y-4">
                <div class="bg-white/5 p-4 rounded-xl border border-white/5">
                    <div class="text-[10px] text-gray-400 uppercase font-bold">Best</div>
                    <div id="stat-best" class="text-xl font-bold text-white">-</div>
                </div>
                <div class="bg-white/5 p-4 rounded-xl border border-white/5">
                    <div class="text-[10px] text-gray-400 uppercase font-bold">Ao5</div>
                    <div id="stat-ao5" class="text-xl font-bold text-blue-400">-</div>
                </div>
                <div class="bg-white/5 p-4 rounded-xl border border-white/5">
                    <div class="text-[10px] text-gray-400 uppercase font-bold">Ao12</div>
                    <div id="stat-ao12" class="text-xl font-bold text-purple-400">-</div>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center relative">
            <input id="userName" type="text" placeholder="Ramonian Name" class="absolute top-10 bg-transparent border-b border-white/10 text-center py-2 outline-none focus:border-blue-500 transition font-bold text-gray-400">
            
            <div id="display" class="timer-font text-[10rem] md:text-[15rem] font-extrabold leading-none">0.00</div>
            
            <div class="absolute bottom-10 text-gray-600 text-[10px] uppercase tracking-[0.5em] font-black">
                Rubicon 2026 • RMHS MNL
            </div>
        </div>

        <div class="w-72 border-l border-white/5 bg-black/20 p-6 hidden lg:block overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xs font-black uppercase tracking-widest text-gray-500">History</h2>
                <button onclick="clearHistory()" class="text-[10px] text-red-500 font-bold hover:underline">Clear</button>
            </div>
            <div id="solve-list" class="space-y-2 text-sm">
                </div>
        </div>
    </div>

    <script>
        let timerInterval;
        let startTime;
        let isRunning = false;
        let isReady = false;
        let spacePressedTime = 0;
        let solves = JSON.parse(localStorage.getItem('rubicon_pro_solves')) || [];

        const display = document.getElementById('display');
        const scrambleDiv = document.getElementById('scramble');
        const solveList = document.getElementById('solve-list');

        // --- SCRAMBLE GENERATOR ---
        function generateScramble() {
            const moves = ["U", "D", "L", "R", "F", "B"];
            const modifiers = ["", "'", "2"];
            let scramble = [];
            let lastMove = "";

            for (let i = 0; i < 20; i++) {
                let move = moves[Math.floor(Math.random() * moves.length)];
                while (move === lastMove) move = moves[Math.floor(Math.random() * moves.length)];
                scramble.push(move + modifiers[Math.floor(Math.random() * modifiers.length)]);
                lastMove = move;
            }
            scrambleDiv.innerText = scramble.join(" ");
        }

        // --- TIMER LOGIC ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (isRunning) {
                    stopTimer();
                } else if (!isReady) {
                    display.classList.add('holding');
                    isReady = true;
                    spacePressedTime = setTimeout(() => {
                        display.classList.remove('holding');
                        display.classList.add('ready');
                    }, 300); // 0.3s delay like real timers
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                if (isReady && !isRunning && display.classList.contains('ready')) {
                    startTimer();
                }
                clearTimeout(spacePressedTime);
                display.classList.remove('holding', 'ready');
                isReady = false;
            }
        });

        function startTimer() {
            isRunning = true;
            startTime = Date.now();
            display.classList.add('running');
            timerInterval = setInterval(() => {
                display.innerText = ((Date.now() - startTime) / 1000).toFixed(2);
            }, 10);
        }

        function stopTimer() {
            isRunning = false;
            clearInterval(timerInterval);
            display.classList.remove('running');
            
            const time = parseFloat(display.innerText);
            solves.unshift({ time, date: new Date().toLocaleTimeString() });
            localStorage.setItem('rubicon_pro_solves', JSON.stringify(solves));
            
            generateScramble();
            updateUI();
        }

        // --- STATS & UI ---
        function calculateAverage(n) {
            if (solves.length < n) return "-";
            const lastN = solves.slice(0, n).map(s => s.time);
            // In WCA, Ao5/Ao12 removes best and worst
            lastN.sort((a, b) => a - b);
            lastN.pop();
            lastN.shift();
            const sum = lastN.reduce((a, b) => a + b, 0);
            return (sum / lastN.length).toFixed(2);
        }

        function updateUI() {
            // Update History
            solveList.innerHTML = solves.map((s, i) => `
                <div class="flex justify-between bg-white/5 p-3 rounded-lg border border-white/5">
                    <span class="text-gray-500 font-bold">#${solves.length - i}</span>
                    <span class="font-mono font-bold text-white">${s.time.toFixed(2)}</span>
                </div>
            `).join('');

            // Update Stats
            document.getElementById('stat-best').innerText = solves.length ? Math.min(...solves.map(s => s.time)).toFixed(2) : "-";
            document.getElementById('stat-ao5').innerText = calculateAverage(5);
            document.getElementById('stat-ao12').innerText = calculateAverage(12);
        }

        function clearHistory() {
            if(confirm("Wipe session?")) {
                solves = [];
                localStorage.removeItem('rubicon_pro_solves');
                updateUI();
            }
        }

        generateScramble();
        updateUI();
    </script>
</body>
</html>
